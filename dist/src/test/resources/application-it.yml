server:
  port: 0

spring:
  datasource:
    url: jdbc:h2:mem:cpayment_it;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

cpayment:
  custody:
    cusserver:
      base-url: http://localhost:0     # overridden by @DynamicPropertySource
      holder-jwt-issuer-url: http://localhost:0
      holder-client-id: cpayment-holder
      holder-client-secret: test-secret
      timeouts:
        connect: PT2S
        read: PT5S
      rabbit:
        host: localhost
        port: 5672
        virtual-host: /
        username: guest
        password: guest
        create-deposit-queue: cpayment.test.deposits
        update-transaction-queue: cpayment.test.tx-updates
  payment:
    merchant-wallets:
      - merchant-id: 11111111-1111-1111-1111-111111111111
        network: eth:mainnet
        wallet-id: aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa

logging:
  level:
    com.cpayment: DEBUG
    org.springframework.amqp: WARN
